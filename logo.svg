<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2979ff"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#g)"/>

  <!-- Wave + pen mark — a flowing S-curve that reads as wave crest above and pen stroke below -->
  <!-- Upper wave arc -->
  <path d="M140 280 Q200 200 256 230 Q312 260 372 190"
        fill="none" stroke="white" stroke-width="36" stroke-linecap="round" opacity="0.9"/>
  <!-- Lower wave arc -->
  <path d="M130 330 Q210 390 256 350 Q302 310 382 370"
        fill="none" stroke="white" stroke-width="36" stroke-linecap="round" opacity="0.7"/>
  <!-- Pen nib at bottom-right, emerging from the wave -->
  <path d="M340 280 L390 410 L256 350Z" fill="white" opacity="0.95"/>
  <!-- Pen nib slit -->
  <line x1="390" y1="410" x2="345" y2="345" stroke="#2979ff" stroke-width="3" opacity="0.5"/>

  <!-- Small ink drop accent -->
  <circle cx="410" cy="430" r="10" fill="white" opacity="0.6"/>
</svg>
