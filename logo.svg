<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm gradient background -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7b42"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#bg)"/>

  <!-- Simple line-drawn seagull (简笔画风格) -->
  <g transform="translate(256,180)" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body: single flowing curve -->
    <path d="M-70,40 Q-40,0 0,-10 Q40,0 70,40"/>

    <!-- Left wing in flight -->
    <path d="M-20,5 Q-80,-60 -140,-30 Q-100,-20 -20,10"/>

    <!-- Right wing in flight -->
    <path d="M20,5 Q80,-60 140,-30 Q100,-20 20,10"/>

    <!-- Head -->
    <circle cx="0" cy="-15" r="12" fill="white" stroke="none"/>

    <!-- Eye (dot) -->
    <circle cx="-5" cy="-17" r="3" fill="#ff7b42" stroke="none"/>

    <!-- Beak -->
    <path d="M-12,-12 L-22,-16 L-12,-10" fill="#ff7b42" stroke="none"/>

    <!-- Tail -->
    <path d="M70,40 Q100,50 110,70"/>
    <path d="M70,40 Q95,55 100,80"/>
  </g>

  <!-- Waves at bottom — three simple arcs -->
  <g fill="none" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.4">
    <path d="M60,400 Q130,370 200,400 Q270,430 340,400 Q400,370 452,390"/>
    <path d="M70,420 Q150,390 230,420 Q310,450 390,420 Q440,400 452,415"/>
    <path d="M80,440 Q160,415 240,440 Q320,465 400,440 Q435,430 452,435"/>
  </g>
</svg>
