<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background tile -->
  <rect x="32" y="32" width="448" height="448" rx="116" fill="#2563eb"/>

  <!--
    Single continuous stroke: wave → S-curve → pen nib
    This is the core mark — reads as ocean wave, letter S, and calligraphy stroke.
  -->
  <path d="
    M 140 180
    C 140 120, 220 120, 256 170
    C 292 220, 370 220, 370 160
    L 370 300
    C 370 370, 290 370, 256 320
    C 222 270, 145 270, 145 330
    L 145 395
    L 125 415
    L 165 395
  "
    fill="none" stroke="white" stroke-width="44" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small accent dot (ink drop / period) -->
  <circle cx="140" cy="425" r="16" fill="white" opacity="0.8"/>
</svg>
