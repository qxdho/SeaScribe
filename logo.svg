<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#bg)"/>

  <!-- Center dot (the drop) -->
  <circle cx="256" cy="256" r="18" fill="white"/>

  <!-- Concentric wave rings — arcs that fade outward -->
  <g fill="none" stroke="white" stroke-linecap="round">
    <path d="M256 190 A66 66 0 0 0 322 256" stroke-width="8" opacity="0.95"/>
    <path d="M256 160 A96 96 0 0 0 352 256" stroke-width="7" opacity="0.75"/>
    <path d="M256 130 A126 126 0 0 0 382 256" stroke-width="6" opacity="0.55"/>
    <path d="M256 100 A156 156 0 0 0 412 256" stroke-width="5" opacity="0.35"/>
    <path d="M256 70 A186 186 0 0 0 442 256" stroke-width="4" opacity="0.20"/>
  </g>

  <!-- Subtle mirror arcs on the other side -->
  <g fill="none" stroke="white" stroke-linecap="round">
    <path d="M256 322 A66 66 0 0 0 190 256" stroke-width="8" opacity="0.95"/>
    <path d="M256 352 A96 96 0 0 0 160 256" stroke-width="7" opacity="0.75"/>
    <path d="M256 382 A126 126 0 0 0 130 256" stroke-width="6" opacity="0.55"/>
    <path d="M256 412 A156 156 0 0 0 100 256" stroke-width="5" opacity="0.35"/>
    <path d="M256 442 A186 186 0 0 0 70 256" stroke-width="4" opacity="0.20"/>
  </g>
</svg>
