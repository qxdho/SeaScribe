<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#bg)"/>

  <!-- Wave arc -->
  <path d="M 100 240 Q 180 170 256 200 Q 332 230 370 190"
    fill="none" stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Pen body (thick vertical bar turning into nib) -->
  <g fill="white">
    <!-- Pen shaft -->
    <rect x="231" y="165" width="20" height="95" rx="4"/>
    <!-- Pen nib — large triangle -->
    <polygon points="241,260 170,380 312,380"/>
    <!-- Nib slit -->
    <rect x="238" y="310" width="6" height="70" rx="2" fill="#1e40af"/>
  </g>

  <!-- Ink drop — big and bold -->
  <circle cx="241" cy="410" r="22" fill="white"/>

  <!-- Small splatter dots -->
  <circle cx="200" cy="430" r="6" fill="white" opacity="0.6"/>
  <circle cx="280" cy="438" r="4" fill="white" opacity="0.4"/>
</svg>
