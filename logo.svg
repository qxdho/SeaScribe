<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7b42"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="116" fill="url(#bg)"/>

  <!-- ONE continuous line: seagull in flight -->
  <!-- Starts at left wingtip → sweeps up into wing → dips down for body → sweeps up into right wing → ends at right wingtip -->
  <path d="
    M 90 280
    Q 150 160 200 210
    Q 240 250 256 240
    Q 272 250 312 210
    Q 362 160 422 280
  "
    fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Waves: three simple arcs -->
  <path d="M 70 390 Q 150 355 230 390 Q 310 425 380 390 Q 430 370 452 385"
    fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <path d="M 80 415 Q 160 385 240 415 Q 320 445 400 415 Q 435 400 452 410"
    fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.25"/>
  <path d="M 90 440 Q 170 415 250 440 Q 330 465 410 440 Q 440 430 452 435"
    fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.15"/>
</svg>
