<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="renderer" content="webkit">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<title>SeaScribe — 课堂听写</title>
<link rel="icon" href="logo.svg">

<!-- Config (must load first) -->
<script src="config/config.js"></script>

<!-- Theme init (must be inline to prevent flash) -->
<script>
(function(){
  var t = (window.__SEASCRIBE_CONFIG__ && window.__SEASCRIBE_CONFIG__.theme) || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<!-- Stylesheets -->
<link rel="stylesheet" href="main/css/theme.css">
<link rel="stylesheet" href="main/css/base.css">
<link rel="stylesheet" href="main/css/topbar.css">
<link rel="stylesheet" href="main/css/pages.css">
<link rel="stylesheet" href="main/css/controls.css">
<link rel="stylesheet" href="main/css/cards.css">
<link rel="stylesheet" href="main/css/splash.css">
<link rel="stylesheet" href="main/css/changelog.css">
<link rel="stylesheet" href="main/css/responsive.css">
</head>
<body>

<!-- ========== 全屏点名覆盖层 ========== -->
<div id="pick-overlay" class="pick-overlay hidden">
  <span id="pick-overlay-text" class="pick-overlay-text"></span>
</div>

<!-- ========== 开屏动画 ========== -->
<div id="splash" class="splash">
  <div class="splash-content">
    <span class="splash-icon">✍</span>
    <span class="splash-title">SeaScribe</span>
    <span class="splash-author">谦虚の海鸥</span>
    <span class="splash-version">v3.0.0</span>
    <span class="splash-vibecoding">本项目使用 vibecoding 开发</span>
    <div id="splash-log" class="splash-log"></div>
    <span class="splash-hint">点击任意位置继续</span>
  </div>
</div>

<!-- ========== 顶栏 ========== -->
<header class="topbar">
  <span class="topbar-brand" id="brand-logo" title="回到学科选择">SeaScribe <span class="topbar-version">v3.0.0</span></span>
  <span class="topbar-spacer"></span>
  <div class="topbar-picker" id="topbar-picker">
    <select class="range-select topbar-select" id="stdlist-select"></select>
    <button id="btn-pick" class="btn btn-dark btn-sm">点名</button>
    <span id="pick-result" class="pick-result"></span>
  </div>
  <button class="tool-btn icon-btn" id="btn-theme" title="切换夜间模式">🌙</button>
  <button class="topbar-btn" id="btn-changelog" title="更新日志">更新日志</button>
</header>

<!-- ========== 学科选择页 ========== -->
<main id="subject-page" class="page">
  <div class="page-hero">
    <h2 class="page-title">选择学科</h2>
    <p class="page-sub">点击卡片开始听写</p>
  </div>
  <div id="subject-list" class="subject-grid"></div>
</main>

<!-- ========== 听写页 ========== -->
<main id="dictation-page" class="page hidden">
  <div class="dictation-header">
    <button class="back-btn" id="btn-back">← 返回</button>
    <h2 class="page-title" id="dictation-title"></h2>
  </div>

  <div class="controls">
    <div id="plugin-config" class="plugin-config-row"></div>

    <div class="control-row">
      <div class="control-item">
        <label class="ctrl-label">数量</label>
        <div class="stepper">
          <button class="stepper-btn" id="count-minus">-</button>
          <input type="number" class="stepper-input" id="count-input" value="12" min="1" max="36" step="1">
          <button class="stepper-btn" id="count-plus">+</button>
        </div>
      </div>
      <div class="control-item">
        <label class="ctrl-label">列数</label>
        <div class="stepper">
          <button class="stepper-btn" id="col-minus">-</button>
          <span class="stepper-val" id="col-display">3</span>
          <button class="stepper-btn" id="col-plus">+</button>
        </div>
      </div>
      <button class="tool-btn layout-btn" id="btn-layout" title="切换列表/网格">☰</button>
      <div class="control-item">
        <label class="ctrl-label">字号</label>
        <button class="tool-btn fs-btn" id="fs-minus" title="缩小">A-</button>
        <input type="range" class="font-slider" id="font-slider" min="60" max="200" value="100" step="5">
        <button class="tool-btn fs-btn" id="fs-plus" title="放大">A+</button>
        <span class="tool-val" id="fs-display">100%</span>
      </div>
      <button id="btn-shuffle" class="btn btn-dark">随机出题</button>
      <button id="btn-reveal" class="btn btn-ghost" disabled>公布答案</button>
    </div>
  </div>

  <div id="card-grid" class="card-grid"></div>
</main>

<!-- ========== 更新日志弹窗 ========== -->
<div id="changelog-overlay" class="changelog-overlay hidden">
  <div class="changelog-card">
    <h2>更新日志</h2>
    <div class="changelog-body" id="changelog-body"></div>
    <button class="btn btn-dark" id="btn-changelog-close">关闭</button>
  </div>
</div>

<!-- ========== Scripts (order matters) ========== -->
<script src="main/js/core.js"></script>
<script src="main/js/theme.js"></script>
<script src="main/js/navigator.js"></script>
<script src="main/js/controls.js"></script>
<script src="main/js/cards.js"></script>

<!-- Student lists -->
<script src="data/stdlist/_registry.js"></script>
<script src="data/stdlist/class11.js"></script>
<script src="data/stdlist/class12.js"></script>

<!-- Plugins -->
<script src="config/english/config.js"></script>
<script src="plugins/english/plugin.js"></script>
<script src="config/chemistry/config.js"></script>
<script src="plugins/chemistry/plugin.js"></script>

<!-- App modules -->
<script src="main/js/picker.js"></script>
<script src="main/js/changelog.js"></script>
<script src="main/js/splash.js"></script>
<script src="main/js/app.js"></script>
</body>
</html>
